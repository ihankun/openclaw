<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>OpenClaw 启动中</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        color-scheme: light;
        --canvas: #f4f5f7;
        --canvas-deep: #e7eaf0;
        --glass: rgba(255, 255, 255, 0.64);
        --glass-edge: rgba(255, 255, 255, 0.9);
        --glass-shadow: rgba(61, 65, 76, 0.16);
        --glass-inset: rgba(255, 255, 255, 0.78);
        --text: #24262c;
        --text-strong: #15171b;
        --muted: #737782;
        --muted-soft: #969aa4;
        --accent: #ee4148;
        --accent-strong: #d92e36;
        --accent-soft: rgba(238, 65, 72, 0.15);
        --accent-cloud: rgba(255, 93, 99, 0.2);
        --cool-cloud: rgba(83, 164, 181, 0.15);
        --track: rgba(32, 35, 42, 0.08);
        --chip: rgba(255, 255, 255, 0.48);
        --chip-edge: rgba(79, 84, 96, 0.1);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --canvas: #0d0e12;
          --canvas-deep: #171920;
          --glass: rgba(25, 27, 34, 0.68);
          --glass-edge: rgba(255, 255, 255, 0.13);
          --glass-shadow: rgba(0, 0, 0, 0.48);
          --glass-inset: rgba(255, 255, 255, 0.07);
          --text: #d8d9de;
          --text-strong: #f5f5f7;
          --muted: #9a9da7;
          --muted-soft: #727681;
          --accent: #ff555b;
          --accent-strong: #f03f47;
          --accent-soft: rgba(255, 85, 91, 0.18);
          --accent-cloud: rgba(255, 73, 80, 0.18);
          --cool-cloud: rgba(77, 154, 172, 0.13);
          --track: rgba(255, 255, 255, 0.09);
          --chip: rgba(255, 255, 255, 0.055);
          --chip-edge: rgba(255, 255, 255, 0.08);
        }
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        position: relative;
        background:
          radial-gradient(circle at 16% 18%, var(--accent-cloud), transparent 32%),
          radial-gradient(circle at 86% 78%, var(--cool-cloud), transparent 36%),
          linear-gradient(145deg, var(--canvas), var(--canvas-deep));
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei",
          sans-serif;
        user-select: none;
      }

      body::before {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
        background-size: 32px 32px;
        content: "";
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.45), transparent 82%);
        pointer-events: none;
      }

      .titlebar-drag-region {
        position: fixed;
        z-index: 10;
        top: 0;
        right: 0;
        left: 0;
        height: 44px;
        -webkit-app-region: drag;
      }

      .ambient-orb {
        position: fixed;
        width: min(34vw, 360px);
        aspect-ratio: 1;
        border-radius: 999px;
        filter: blur(72px);
        opacity: 0.52;
        pointer-events: none;
        will-change: transform;
      }

      .ambient-orb--red {
        top: -14%;
        left: 5%;
        background: var(--accent-cloud);
        animation: drift-red 9s ease-in-out infinite alternate;
      }

      .ambient-orb--blue {
        right: 3%;
        bottom: -18%;
        background: var(--cool-cloud);
        animation: drift-blue 11s ease-in-out infinite alternate;
      }

      .stage {
        position: relative;
        z-index: 1;
        display: grid;
        width: 100%;
        height: 100%;
        place-items: center;
        padding: 60px 24px 28px;
        -webkit-app-region: drag;
      }

      .launch-card {
        position: relative;
        width: min(440px, 100%);
        overflow: hidden;
        border: 1px solid var(--glass-edge);
        border-radius: 30px;
        background: linear-gradient(145deg, var(--glass), color-mix(in srgb, var(--glass) 70%, transparent));
        box-shadow:
          0 28px 80px var(--glass-shadow),
          inset 0 1px 0 var(--glass-inset);
        padding: 34px 34px 30px;
        text-align: center;
        backdrop-filter: blur(30px) saturate(150%);
        -webkit-backdrop-filter: blur(30px) saturate(150%);
      }

      .launch-card::before {
        position: absolute;
        top: -110px;
        left: 50%;
        width: 260px;
        height: 180px;
        border-radius: 999px;
        background: var(--accent-soft);
        content: "";
        filter: blur(46px);
        pointer-events: none;
        transform: translateX(-50%);
      }

      .brand {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .logo-frame {
        position: relative;
        display: grid;
        width: 82px;
        height: 82px;
        place-items: center;
        margin-bottom: 22px;
        border: 1px solid var(--glass-edge);
        border-radius: 24px;
        background: color-mix(in srgb, var(--glass) 72%, transparent);
        box-shadow:
          0 15px 38px var(--accent-soft),
          inset 0 1px 0 var(--glass-inset);
      }

      .logo-frame::after {
        position: absolute;
        inset: 8px;
        border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
        border-radius: 18px;
        content: "";
      }

      .logo {
        position: relative;
        z-index: 1;
        width: 62px;
        height: 62px;
        object-fit: contain;
        filter: drop-shadow(0 10px 18px rgba(123, 20, 25, 0.18));
      }

      .eyebrow {
        margin-bottom: 9px;
        color: var(--accent-strong);
        font-size: 11px;
        font-weight: 750;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      h1 {
        color: var(--text-strong);
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.035em;
        line-height: 1.3;
      }

      .subtitle {
        max-width: 320px;
        margin: 10px auto 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.65;
      }

      .progress-panel {
        position: relative;
        margin-top: 28px;
        border: 1px solid var(--chip-edge);
        border-radius: 18px;
        background: var(--chip);
        padding: 15px 16px 14px;
        text-align: left;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .status-label {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 9px;
        color: var(--text);
        font-size: 12px;
        font-weight: 600;
      }

      .status-dot {
        position: relative;
        width: 8px;
        height: 8px;
        flex: 0 0 auto;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 5px var(--accent-soft);
      }

      .status-dot::after {
        position: absolute;
        inset: -5px;
        border: 1px solid var(--accent);
        border-radius: inherit;
        animation: pulse 1.8s ease-out infinite;
        content: "";
      }

      .status-hint {
        flex: 0 0 auto;
        color: var(--muted-soft);
        font-size: 11px;
      }

      .progress-track {
        position: relative;
        height: 5px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--track);
      }

      .progress-value {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(90deg, transparent, var(--accent), var(--accent-strong));
        box-shadow: 0 0 18px var(--accent-soft);
        transition: width 0.5s ease;
      }

      .startup-steps {
        display: flex;
        justify-content: center;
        gap: 7px;
        margin-top: 18px;
        color: var(--muted-soft);
        font-size: 11px;
      }

      .startup-steps span {
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }

      .startup-steps span + span::before {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: currentColor;
        content: "";
        opacity: 0.5;
      }

      @keyframes progress {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(340%);
        }
      }

      @keyframes pulse {
        0% {
          opacity: 0.7;
          transform: scale(0.65);
        }
        75%,
        100% {
          opacity: 0;
          transform: scale(1.55);
        }
      }

      @keyframes drift-red {
        to {
          transform: translate(8vw, 6vh) scale(1.08);
        }
      }

      @keyframes drift-blue {
        to {
          transform: translate(-7vw, -5vh) scale(0.92);
        }
      }

      @media (max-width: 560px), (max-height: 540px) {
        .stage {
          padding: 50px 18px 22px;
        }

        .launch-card {
          border-radius: 24px;
          padding: 26px 24px 23px;
        }

        .logo-frame {
          width: 70px;
          height: 70px;
          margin-bottom: 17px;
          border-radius: 21px;
        }

        .logo-frame::after {
          border-radius: 15px;
        }

        .logo {
          width: 52px;
          height: 52px;
        }

        h1 {
          font-size: 21px;
        }

        .progress-panel {
          margin-top: 21px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .ambient-orb,
        .progress-value,
        .status-dot::after {
          animation: none;
        }

        .progress-value {
          left: 0;
          width: 64%;
        }
      }
    </style>
  </head>
  <body>
    <div class="titlebar-drag-region" aria-hidden="true"></div>
    <div class="ambient-orb ambient-orb--red" aria-hidden="true"></div>
    <div class="ambient-orb ambient-orb--blue" aria-hidden="true"></div>

    <main class="stage">
      <section class="launch-card" aria-labelledby="startup-title">
        <div class="brand">
          <div class="logo-frame">
            <img
              class="logo"
              src="../../assets/openclaw-logo.png"
              alt="OpenClaw"
              draggable="false"
            />
          </div>
          <div class="eyebrow">OpenClaw Desktop</div>
          <h1 id="startup-title">正在启动本地网关</h1>
          <p class="subtitle" id="progress-subtitle">正在恢复服务与工作区，请稍候片刻。</p>
        </div>

        <div class="progress-panel" role="status" aria-live="polite">
          <div class="status-row">
            <div class="status-label">
              <span class="status-dot" aria-hidden="true"></span>
              <span id="progress-label">正在连接 OpenClaw 服务</span>
            </div>
            <span class="status-hint" id="progress-elapsed">安全启动</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-value" id="progress-bar"></div>
          </div>
        </div>


      </section>
    </main>

    <script>
      const steps = [
        "dotenv", "env-select", "pre-bootstrap", "bootstrap",
        "config", "auth", "starting",
        "plugins", "plugins-table", "plugins-load",
        "handlers", "http", "http-ready",
        "channels", "sidecars", "sidecars-ready",
        "maintenance", "ready"
      ];
      const STEP_PCT = 100 / steps.length; // each step = ~5.5%

      const labelEl = document.getElementById("progress-label");
      const elapsedEl = document.getElementById("progress-elapsed");
      const barEl = document.getElementById("progress-bar");
      const subtitleEl = document.getElementById("progress-subtitle");

      let currentStep = -1;

      if (window.electronAPI && window.electronAPI.onGatewayProgress) {
        window.electronAPI.onGatewayProgress((data) => {
          const idx = steps.indexOf(data.step);
          if (idx === -1) return;
          if (idx <= currentStep) return; // never go back

          currentStep = idx;
          const pct = ((idx + 1) / steps.length) * 100;
          barEl.style.width = pct.toFixed(1) + "%";
          labelEl.textContent = data.label;

          if (data.step === "ready") {
            subtitleEl.textContent = "网关已就绪，正在加载界面...";
          }
        });
      }

      let counter = 0;
      setInterval(() => {
        counter++;
        elapsedEl.textContent = counter + "s";
      }, 1000);
    </script>
  </body>
</html>
